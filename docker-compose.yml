version: '3.8'

services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: semarang-pipeline
    volumes:
      # Mount source files
      - ./raw:/app/raw:ro
      - ./state:/app/state
      - ./output:/app/output
      # Mount .env file if exists
      - ./.env:/app/.env:ro
    environment:
      - ZAI_API_KEY=${ZAI_API_KEY}
      - ZAI_API_URL=${ZAI_API_URL}
      - YANDEX_API_KEY=${YANDEX_API_KEY}
      - YANDEX_FOLDER_ID=${YANDEX_FOLDER_ID}
      - YANDEX_TTS_URL=${YANDEX_TTS_URL}
      - YANDEX_VOICE=${YANDEX_VOICE:-alice}
      - YANDEX_LANGUAGE=${YANDEX_LANGUAGE:-ru-RU}
      - TTS_MAX_CHARS_PER_DAY=${TTS_MAX_CHARS_PER_DAY:-2000}
      - TTS_SPEECH_RATE_CHARS_PER_SEC=${TTS_SPEECH_RATE_CHARS_PER_SEC:-8.0}
      - VIDEO_MAX_DURATION_SECONDS=${VIDEO_MAX_DURATION_SECONDS:-60}
      - VIDEO_TARGET_DURATION_SECONDS=${VIDEO_TARGET_DURATION_SECONDS:-50}
      - VIDEO_WIDTH=${VIDEO_WIDTH:-1080}
      - VIDEO_HEIGHT=${VIDEO_HEIGHT:-1920}
      - PUPPETEER_SERVICE_URL=http://puppeteer:3000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      puppeteer:
        condition: service_healthy
    networks:
      - semarang-network
    restart: unless-stopped

  puppeteer:
    build:
      context: .
      dockerfile: Dockerfile.puppeteer
    container_name: semarang-puppeteer
    volumes:
      - ./output:/app/output
      - ./puppeteer:/app/puppeteer:ro
      - ./static:/app/static:ro
    environment:
      - PORT=3000
      - OUTPUT_DIR=/app/output/videos
      - NODE_ENV=production
    ports:
      - "3000:3000"
    networks:
      - semarang-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  semarang-network:
    driver: bridge

volumes:
  # If you want persistent state, uncomment and use named volumes
  # state:
  # output:
